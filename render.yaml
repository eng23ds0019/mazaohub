services:
  - type: web
    name: mazaohub
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@mazaohub.com
      - key: ADMIN_PASSWORD
        value: Mazao@2024
